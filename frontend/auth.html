<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #f6f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: #fff;
            border-radius: 30px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 480px;
        }

        .container p {
            font-size: 14px;
            line-height: 20px;
            letter-spacing: 0.3px;
            margin: 20px 0;
        }

        .container span {
            font-size: 12px;
        }

        .container a {
            color: #333;
            font-size: 13px;
            text-decoration: none;
            margin: 15px 0 10px;
        }

        .container button {
            background-color: #2563eb;
            color: #fff;
            font-size: 12px;
            padding: 10px 45px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 80ms ease-in;
        }

        .container button:active {
            transform: scale(0.95);
        }

        .container button:focus {
            outline: none;
        }

        .container button.hidden {
            background-color: transparent;
            border-color: #fff;
        }

        .container form {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            height: 100%;
            text-align: center;
        }

        .container input {
            background-color: #eee;
            border: none;
            margin: 8px 0;
            padding: 10px 15px;
            font-size: 13px;
            border-radius: 8px;
            width: 100%;
            outline: none;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }

        .sign-in {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .container.active .sign-in {
            transform: translateX(100%);
        }

        .sign-up {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .container.active .sign-up {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: move 0.6s;
        }

        @keyframes move {
            0%, 49.99% {
                opacity: 0;
                z-index: 1;
            }
            50%, 100% {
                opacity: 1;
                z-index: 5;
            }
        }

        .social-icons {
            margin: 20px 0;
        }

        .social-icons a {
            border: 1px solid #ccc;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px;
            width: 40px;
            height: 40px;
            color: #333;
            text-decoration: none;
        }

        .toggle-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: all 0.6s ease-in-out;
            border-radius: 150px 0 0 100px;
            z-index: 1000;
        }

        .container.active .toggle-container {
            transform: translateX(-100%);
            border-radius: 0 150px 100px 0;
        }

        .toggle {
            background-color: #2563eb;
            color: #fff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: all 0.6s ease-in-out;
        }

        .container.active .toggle {
            transform: translateX(50%);
        }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 30px;
            text-align: center;
            top: 0;
            transform: translateX(0);
            transition: all 0.6s ease-in-out;
        }

        .toggle-left {
            transform: translateX(-200%);
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), url('assets/img/login.png') no-repeat center center / cover;
        }

        .container.active .toggle-left {
            transform: translateX(0);
        }

        .toggle-right {
            right: 0;
            transform: translateX(0);
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), url('assets/img/signup.png') no-repeat center center / cover;
        }

        .container.active .toggle-right {
            transform: translateX(200%);
        }

        /* Loading Spinner */
        #authSpinner {
            display: none;
            margin-top: 10px;
            color: #2563eb;
        }
        
        .error-text {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <!-- Form Đăng ký -->
        <div class="form-container sign-up">
            <form id="signupForm">
                <h1 style="margin-bottom: 20px;">Tạo tài khoản</h1>
                <input type="text" id="signupName" placeholder="Tên của bạn" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPass" placeholder="Mật khẩu" required>
                <p class="error-text" id="signupError"></p>
                <button type="submit">Đăng ký</button>
                <div id="signupSpinner"><i class="fa-solid fa-spinner fa-spin" style="display:none; color: #2563eb; margin-top: 10px;"></i></div>
            </form>
        </div>

        <!-- Form Đăng nhập -->
        <div class="form-container sign-in">
            <form id="loginForm">
                <h1 style="margin-bottom: 20px;">Đăng nhập SkinGuard</h1>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPass" placeholder="Mật khẩu" required>
                <a href="#">Quên mật khẩu?</a>
                <p class="error-text" id="loginError"></p>
                <button type="submit">Đăng nhập</button>
                <div id="loginSpinner"><i class="fa-solid fa-spinner fa-spin" style="display:none; color: #2563eb; margin-top: 10px;"></i></div>
            </form>
        </div>

        <!-- Phần chuyển đổi -->
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1 style="color: #fff;">Chào mừng trở lại!</h1>
                    <p style="color: #eee;">Nhập thông tin cá nhân để sử dụng tất cả tính năng chẩn đoán AI</p>
                    <button class="hidden" id="login">Đăng nhập</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1 style="color: #fff;">Tạo hồ sơ DermAI</h1>
                    <p style="color: #eee;">Đăng ký để lưu trữ kết quả và phân tích tổn thương da</p>
                    <button class="hidden" id="register">Đăng ký</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Logic -->
    <script type="module">
        import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from './js/firebase-config.js';

        // Check if already logged in (redirect to app)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'app.html';
            }
        });

        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        // Toggle UI
        registerBtn.addEventListener('click', () => {
            container.classList.add("active");
            document.getElementById('loginError').style.display = 'none';
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove("active");
            document.getElementById('signupError').style.display = 'none';
        });

        // Login Logic
        const loginForm = document.getElementById('loginForm');
        const loginSpinner = document.querySelector('#loginSpinner i');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            loginError.style.display = 'none';
            loginSpinner.style.display = 'inline-block';
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                // The onAuthStateChanged listener will handle the redirect
            } catch (error) {
                console.error("Login Error:", error);
                loginError.textContent = "Email hoặc mật khẩu không chính xác.";
                loginError.style.display = 'block';
                loginSpinner.style.display = 'none';
            }
        });

        // Signup Logic
        const signupForm = document.getElementById('signupForm');
        const signupSpinner = document.querySelector('#signupSpinner i');
        const signupError = document.getElementById('signupError');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPass').value;
            
            signupError.style.display = 'none';
            signupSpinner.style.display = 'inline-block';
            
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                // The onAuthStateChanged listener will handle the redirect
            } catch (error) {
                console.error("Signup Error:", error);
                let msg = "Lỗi tạo tài khoản.";
                if (error.code === 'auth/email-already-in-use') msg = "Email này đã được sử dụng.";
                if (error.code === 'auth/weak-password') msg = "Mật khẩu phải từ 6 ký tự.";
                signupError.textContent = msg;
                signupError.style.display = 'block';
                signupSpinner.style.display = 'none';
            }
        });
    </script>

</body>
</html>
